<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>Bridge</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #0a0a0a; overflow: hidden; }

  @keyframes breathe {
    0%,100% { opacity: 0.05; transform: scale(1); }
    50% { opacity: 0.13; transform: scale(1.1); }
  }
  @keyframes ripple {
    0% { transform: scale(1); opacity: 0.5; }
    100% { transform: scale(4); opacity: 0; }
  }
  @keyframes ripple2 {
    0% { transform: scale(1); opacity: 0.3; }
    100% { transform: scale(3); opacity: 0; }
  }
  @keyframes blink {
    0%,100% { opacity: 1; }
    50% { opacity: 0.15; }
  }
  @keyframes liveIn {
    0% { opacity: 0; letter-spacing: 0.4em; }
    100% { opacity: 1; letter-spacing: 0.06em; }
  }

  .page {
    min-height: 100vh; background: #0a0a0a;
    display: flex; flex-direction: column;
    padding: 48px 24px 36px;
  }
  .hidden { display: none !important; }
  .page-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 40px; color: #fff;
    letter-spacing: 0.04em; line-height: 1;
    margin-bottom: 28px;
  }
  .red { color: #ff3b30; }
  .label {
    font-family: 'DM Mono', monospace;
    font-size: 9px; color: #333;
    letter-spacing: 0.22em; text-transform: uppercase;
    margin-bottom: 10px; display: block;
  }
  .card {
    background: #0f0f0f; border: 1px solid #1a1a1a;
    border-radius: 14px; padding: 20px; margin-bottom: 12px;
  }
  .card-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px; color: #ff3b30;
    letter-spacing: 0.22em; text-transform: uppercase;
    margin-bottom: 14px; display: block;
  }
  .input-row {
    display: flex; align-items: center;
    border-bottom: 1px solid #1e1e1e;
    padding-bottom: 8px;
  }
  .prefix {
    font-family: 'DM Mono', monospace;
    font-size: 22px; color: #ff3b30;
    letter-spacing: 0.05em;
    flex-shrink: 0; padding-right: 4px;
  }
  input[type=tel] {
    background: transparent; border: none;
    outline: none; color: #fff;
    font-family: 'DM Mono', monospace;
    font-size: 22px; width: 100%;
    letter-spacing: 0.05em; padding: 8px 0;
    -webkit-tap-highlight-color: transparent;
  }
  input::placeholder { color: #252525; }

  .btn-main {
    width: 100%; padding: 20px;
    border-radius: 14px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px; letter-spacing: 0.12em;
    cursor: pointer; transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
    display: block;
  }
  .btn-active {
    border: 1px solid rgba(255,59,48,0.5);
    background: rgba(255,59,48,0.07); color: #ff3b30;
  }
  .btn-inactive {
    border: 1px solid #181818;
    background: transparent; color: #282828;
    cursor: not-allowed;
  }

  #screen-armed {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: #0a0a0a; cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  #glow {
    position: absolute; width: 300px; height: 300px; border-radius: 50%;
    background: radial-gradient(circle, rgba(255,59,48,1) 0%, transparent 70%);
    animation: breathe 2.6s ease-in-out infinite; pointer-events: none;
  }
  .ring {
    position: absolute; width: 150px; height: 150px;
    border-radius: 50%; pointer-events: none;
  }
  #ring1 { border: 1px solid rgba(255,59,48,0.4); animation: ripple 1.7s ease-out infinite; }
  #ring2 { border: 1px solid rgba(255,59,48,0.2); animation: ripple2 1.7s ease-out 0.6s infinite; }
  #center-dot {
    width: 12px; height: 12px; border-radius: 50%;
    background: #ff3b30; box-shadow: 0 0 24px rgba(255,59,48,0.9);
    z-index: 2; margin-bottom: 24px;
  }
  #tap-word {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 96px; color: #fff;
    letter-spacing: 0.06em; line-height: 1; z-index: 2;
  }
  #armed-sub {
    font-family: 'DM Mono', monospace;
    font-size: 10px; color: #222;
    letter-spacing: 0.22em; text-transform: uppercase;
    z-index: 2; margin-top: 14px;
  }
  #ghost-names {
    position: absolute; bottom: 36px;
    left: 0; right: 0; text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: 11px; color: #1a1a1a;
    letter-spacing: 0.1em; line-height: 2.5;
    pointer-events: none;
  }
  #disarm-btn {
    position: absolute; top: 20px; right: 20px;
    background: none; border: none;
    font-family: 'DM Mono', monospace;
    font-size: 9px; color: #1c1c1c;
    cursor: pointer; padding: 12px;
    -webkit-tap-highlight-color: transparent;
  }
  #screen-firing {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: #0a0a0a; gap: 14px;
  }
  #firing-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: #ff3b30; animation: blink 0.7s infinite;
    box-shadow: 0 0 16px rgba(255,59,48,0.8);
  }
  #firing-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 56px; color: #ff3b30;
    letter-spacing: 0.08em; animation: blink 1s infinite;
  }
  #firing-sub {
    font-family: 'DM Mono', monospace;
    font-size: 10px; color: #282828; letter-spacing: 0.2em;
  }
  #screen-live {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: #0a0a0a; gap: 10px; padding: 32px;
  }
  #live-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: #ff3b30; box-shadow: 0 0 22px rgba(255,59,48,0.9);
    animation: blink 1.4s ease-in-out infinite; margin-bottom: 6px;
  }
  #live-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 72px; color: #fff;
    letter-spacing: 0.06em; animation: liveIn 0.5s ease both;
  }
  #live-numbers {
    font-family: 'DM Mono', monospace;
    font-size: 12px; color: #2e2e2e;
    letter-spacing: 0.08em; text-align: center; line-height: 2.6;
  }
  #end-btn {
    margin-top: 52px; background: none;
    border: 1px solid #1a1a1a; border-radius: 12px;
    padding: 16px 40px; color: #282828;
    font-family: 'DM Mono', monospace;
    font-size: 10px; letter-spacing: 0.2em;
    text-transform: uppercase; cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  #url-toggle {
    background: none; border: none;
    font-family: 'DM Mono', monospace;
    font-size: 9px; color: #1e1e1e;
    letter-spacing: 0.15em; text-transform: uppercase;
    cursor: pointer; padding: 8px 0; display: block;
  }
  #url-box {
    width: 100%; background: #111;
    border: 1px solid #1e1e1e; border-radius: 8px;
    padding: 11px 12px; color: #555;
    font-family: 'DM Mono', monospace;
    font-size: 12px; outline: none; margin-bottom: 14px;
    display: none;
  }
</style>
</head>
<body>

<!-- SETUP -->
<div id="screen-setup" class="page">
  <div class="page-title">Setup<br><span class="red">Bridge</span></div>

  <div class="card">
    <span class="card-label">PERSON A</span>
    <span class="label">Phone Number</span>
    <div class="input-row">
      <span class="prefix">+965</span>
      <input type="tel" id="input-num-a" placeholder="XXXX XXXX" autocomplete="off" maxlength="8">
    </div>
  </div>

  <div class="card">
    <span class="card-label">PERSON B</span>
    <span class="label">Phone Number</span>
    <div class="input-row">
      <span class="prefix">+965</span>
      <input type="tel" id="input-num-b" placeholder="XXXX XXXX" autocomplete="off" maxlength="8">
    </div>
  </div>

  <button id="url-toggle" onclick="toggleUrl()">▼ server url</button>
  <input type="url" id="url-box" value="https://bridge-server-production-a25d.up.railway.app">

  <div style="flex:1"></div>
  <button class="btn-main btn-inactive" id="arm-btn" onclick="arm()">ENTER BOTH NUMBERS</button>
</div>

<!-- ARMED -->
<div id="screen-armed" class="hidden">
  <div id="glow"></div>
  <div class="ring" id="ring1"></div>
  <div class="ring" id="ring2"></div>
  <div id="center-dot"></div>
  <div id="tap-word">TAP</div>
  <div id="armed-sub">anywhere · any finger</div>
  <div id="ghost-names"></div>
  <button id="disarm-btn" onclick="disarm(event)">✕</button>
</div>

<!-- FIRING -->
<div id="screen-firing" class="hidden">
  <div id="firing-dot"></div>
  <div id="firing-text">RINGING</div>
  <div id="firing-sub"></div>
</div>

<!-- LIVE -->
<div id="screen-live" class="hidden">
  <div id="live-dot"></div>
  <div id="live-text">LIVE</div>
  <div id="live-numbers"></div>
  <button id="end-btn" onclick="resetApp()">end + reset</button>
</div>

<script>
  var SERVER = 'https://bridge-server-production-a25d.up.railway.app';
  var callSids = null;
  var hasFired = false;
  var urlOpen = false;

  function getVal(id) {
    return document.getElementById(id).value.trim();
  }

  function fullNumber(id) {
    return '+965' + getVal(id);
  }

  function showScreen(name) {
    var screens = ['screen-setup','screen-armed','screen-firing','screen-live'];
    for (var i = 0; i < screens.length; i++) {
      var el = document.getElementById(screens[i]);
      if (screens[i] === name) {
        el.classList.remove('hidden');
      } else {
        el.classList.add('hidden');
      }
    }
  }

  function toggleUrl() {
    urlOpen = !urlOpen;
    document.getElementById('url-box').style.display = urlOpen ? 'block' : 'none';
    document.getElementById('url-toggle').textContent = urlOpen ? '▲ server url' : '▼ server url';
  }

  function vibe(p) {
    try { if (navigator.vibrate) navigator.vibrate(p); } catch(e) {}
  }

  function checkReady() {
    var numA = getVal('input-num-a');
    var numB = getVal('input-num-b');
    var btn  = document.getElementById('arm-btn');
    var ready = numA.length >= 7 && numB.length >= 7;
    btn.className = 'btn-main ' + (ready ? 'btn-active' : 'btn-inactive');
    btn.textContent = ready ? 'ARM' : 'ENTER BOTH NUMBERS';
  }

  document.getElementById('input-num-a').addEventListener('input', checkReady);
  document.getElementById('input-num-b').addEventListener('input', checkReady);

  function arm() {
    var numA = getVal('input-num-a');
    var numB = getVal('input-num-b');
    if (numA.length < 7 || numB.length < 7) return;

    var urlVal = document.getElementById('url-box').value.trim();
    if (urlVal) SERVER = urlVal;

    hasFired = false;
    document.getElementById('ghost-names').innerHTML = '+965' + numA + '<br>+965' + numB;
    document.getElementById('armed-sub').textContent = 'anywhere · any finger';
    document.getElementById('armed-sub').style.color = '#222';

    showScreen('screen-armed');
    vibe([60, 40, 60]);

    document.getElementById('screen-armed').onclick = fire;
    document.getElementById('screen-armed').ontouchstart = fire;
  }

  function disarm(e) {
    e.stopPropagation();
    showScreen('screen-setup');
  }

  function fire(e) {
    if (e) { e.preventDefault(); e.stopPropagation(); }
    if (hasFired) return;
    hasFired = true;

    var numA = fullNumber('input-num-a');
    var numB = fullNumber('input-num-b');

    vibe([180]);
    document.getElementById('firing-sub').textContent = numA + ' · ' + numB;
    showScreen('screen-firing');

    fetch(SERVER + '/bridge', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ numberA: numA, numberB: numB })
    })
    .then(function(res) { return res.json(); })
    .then(function(data) {
      if (data.error) throw new Error(data.error);
      callSids = { callASid: data.callASid, callBSid: data.callBSid };
      document.getElementById('live-numbers').innerHTML =
        '<span style="color:#383838">' + numA + '</span><br>' +
        '<span style="color:#1e1e1e;font-size:10px">⟷ connected ⟷</span><br>' +
        '<span style="color:#383838">' + numB + '</span>';
      showScreen('screen-live');
      vibe([50,30,50,30,50]);
    })
    .catch(function(err) {
      hasFired = false;
      document.getElementById('armed-sub').textContent = 'RETRY';
      document.getElementById('armed-sub').style.color = '#ff3b30';
      showScreen('screen-armed');
      vibe([400]);
      setTimeout(function() {
        document.getElementById('armed-sub').textContent = 'anywhere · any finger';
        document.getElementById('armed-sub').style.color = '#222';
      }, 3000);
    });
  }

  function resetApp() {
    if (callSids) {
      fetch(SERVER + '/end', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(callSids)
      }).catch(function(){});
    }
    callSids = null;
    hasFired = false;
    document.getElementById('input-num-a').value = '';
    document.getElementById('input-num-b').value = '';
    checkReady();
    showScreen('screen-setup');
  }
</script>
</body>
</html>
