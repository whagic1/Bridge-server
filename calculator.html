<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Calculator</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%; width: 100%;
    background: #000;
    font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    overflow: hidden;
    user-select: none;
  }
  #camera-feed {
    position: fixed; top: -9999px; left: -9999px;
    width: 640px; height: 480px;
    opacity: 0; pointer-events: none;
  }
  #ocr-canvas {
    position: fixed; top: -9999px; left: -9999px;
    pointer-events: none;
  }
  .calculator {
    width: 100%; height: 100vh;
    background: #000;
    display: flex; flex-direction: column;
    padding-bottom: env(safe-area-inset-bottom);
  }
  .display {
    flex: 1;
    display: flex; flex-direction: column;
    justify-content: flex-end; align-items: flex-end;
    padding: 0 28px 12px;
    min-height: 220px;
  }
  .expression {
    font-size: 22px; color: rgba(255,255,255,0.4);
    margin-bottom: 4px; min-height: 28px;
    text-align: right; letter-spacing: -0.3px;
  }
  .main-display {
    font-size: 88px; font-weight: 200;
    color: #fff; letter-spacing: -4px;
    line-height: 1; text-align: right;
    transition: font-size 0.1s ease;
    word-break: break-all;
  }
  .main-display.small { font-size: 56px; letter-spacing: -2px; }
  .main-display.smaller { font-size: 42px; letter-spacing: -1px; }
  .buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    padding: 12px 16px 20px;
  }
  .btn {
    aspect-ratio: 1; border-radius: 50%; border: none;
    font-size: 32px; font-weight: 400; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: filter 0.08s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active { filter: brightness(0.75); }
  .btn-func { background: #a5a5a5; color: #000; font-size: 28px; }
  .btn-op { background: #ff9f0a; color: #fff; }
  .btn-op.active-op { background: #fff; color: #ff9f0a; }
  .btn-num { background: #333333; color: #fff; }
  .btn-zero {
    grid-column: span 2; border-radius: 44px; aspect-ratio: unset;
    height: calc((100vw - 32px - 36px) / 4);
    justify-content: flex-start; padding-left: 36px; font-size: 32px;
  }
  #ocr-status {
    position: fixed; top: 12px; left: 16px;
    width: 6px; height: 6px; border-radius: 50%;
    background: transparent; z-index: 100; transition: background 0.3s;
  }
  #ocr-status.scanning { background: rgba(255,149,0,0.6); }
  #ocr-status.found { background: rgba(52,199,89,0.8); }
</style>
</head>
<body>

<video id="camera-feed" autoplay playsinline muted></video>
<canvas id="ocr-canvas" width="640" height="480"></canvas>
<div id="ocr-status"></div>

<div class="calculator">
  <div class="display">
    <div class="expression" id="expression"></div>
    <div class="main-display" id="main-display">0</div>
  </div>
  <div class="buttons">
    <button class="btn btn-func" onclick="pressFunc('AC')" id="ac-btn">AC</button>
    <button class="btn btn-func" onclick="pressFunc('+/-')">⁺∕₋</button>
    <button class="btn btn-func" onclick="pressFunc('%')">%</button>
    <button class="btn btn-op"   onclick="pressOp('÷')">÷</button>
    <button class="btn btn-num" onclick="pressNum('7')">7</button>
    <button class="btn btn-num" onclick="pressNum('8')">8</button>
    <button class="btn btn-num" onclick="pressNum('9')">9</button>
    <button class="btn btn-op"  onclick="pressOp('×')">×</button>
    <button class="btn btn-num" onclick="pressNum('4')">4</button>
    <button class="btn btn-num" onclick="pressNum('5')">5</button>
    <button class="btn btn-num" onclick="pressNum('6')">6</button>
    <button class="btn btn-op"  onclick="pressOp('−')">−</button>
    <button class="btn btn-num" onclick="pressNum('1')">1</button>
    <button class="btn btn-num" onclick="pressNum('2')">2</button>
    <button class="btn btn-num" onclick="pressNum('3')">3</button>
    <button class="btn btn-op"  onclick="pressOp('+')">+</button>
    <button class="btn btn-num btn-zero" onclick="pressNum('0')">0</button>
    <button class="btn btn-num" onclick="pressNum('.')">.</button>
    <button class="btn btn-op"  onclick="pressEquals()">=</button>
  </div>
</div>

<script>
var display = '0', expression = '', lastOp = '', firstNum = null, justEquals = false;
var mainEl = document.getElementById('main-display');
var exprEl = document.getElementById('expression');
var acBtn  = document.getElementById('ac-btn');
var statusEl = document.getElementById('ocr-status');

function updateDisplay(val) {
  mainEl.textContent = val;
  var len = val.length;
  mainEl.className = 'main-display' + (len > 9 ? ' smaller' : len > 6 ? ' small' : '');
}
function setDisplay(val) {
  display = val; updateDisplay(display);
  acBtn.textContent = display === '0' ? 'AC' : 'C';
}
function pressNum(n) {
  if (justEquals) { display = '0'; justEquals = false; }
  if (n === '.' && display.includes('.')) return;
  if (display === '0' && n !== '.') { display = n; }
  else { if (display.replace('-','').replace('.','').length >= 9) return; display += n; }
  setDisplay(display); highlightOp(null);
}
function pressOp(op) {
  justEquals = false; firstNum = parseFloat(display); lastOp = op;
  expression = display + ' ' + op; exprEl.textContent = expression;
  display = '0'; highlightOp(op);
}
function pressEquals() {
  if (!lastOp || firstNum === null) return;
  var second = parseFloat(display), result;
  switch(lastOp) {
    case '+': result = firstNum + second; break;
    case '−': result = firstNum - second; break;
    case '×': result = firstNum * second; break;
    case '÷': result = second !== 0 ? firstNum / second : 'Error'; break;
    default: result = second;
  }
  exprEl.textContent = expression + ' ' + display + ' =';
  var r = typeof result === 'number' ? (Number.isInteger(result) ? result.toString() : parseFloat(result.toFixed(9)).toString()) : result;
  setDisplay(r); lastOp = ''; firstNum = null; justEquals = true; highlightOp(null);
}
function pressFunc(f) {
  if (f === 'AC' || f === 'C') {
    display = '0'; expression = ''; lastOp = ''; firstNum = null; justEquals = false;
    setDisplay('0'); exprEl.textContent = ''; highlightOp(null);
  } else if (f === '+/-') {
    if (display !== '0') { display = display.startsWith('-') ? display.slice(1) : '-' + display; setDisplay(display); }
  } else if (f === '%') {
    display = (parseFloat(display) / 100).toString(); setDisplay(display);
  }
}
function highlightOp(op) {
  document.querySelectorAll('.btn-op').forEach(function(b) {
    b.classList.remove('active-op');
    if (op && b.textContent.trim() === op) b.classList.add('active-op');
  });
}

// SECRET: Force display to their number
function forceDisplay(number) {
  display = number; expression = ''; lastOp = ''; firstNum = null; justEquals = false;
  updateDisplay(display); exprEl.textContent = ''; acBtn.textContent = 'C';
}

// OCR Engine
var video = document.getElementById('camera-feed');
var canvas = document.getElementById('ocr-canvas');
var ctx = canvas.getContext('2d');
var scanning = false, lastDetected = null, scanInterval = null, ocrReady = false, worker = null;

async function initOCR() {
  try {
    worker = await Tesseract.createWorker('eng', 1, { logger: function() {} });
    await worker.setParameters({
      tessedit_char_whitelist: '0123456789',
      tessedit_pageseg_mode: '7',
    });
    ocrReady = true;
  } catch(e) { console.log('OCR init error:', e); }
}

async function startCamera() {
  try {
    var stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { exact: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false
    });
    video.srcObject = stream; video.play(); startScanning();
  } catch(e) {
    try {
      var stream2 = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false });
      video.srcObject = stream2; video.play(); startScanning();
    } catch(e2) { console.log('Camera error:', e2); }
  }
}

function startScanning() {
  if (scanInterval) clearInterval(scanInterval);
  scanning = true; statusEl.className = 'scanning';
  scanInterval = setInterval(captureAndOCR, 800);
}

async function captureAndOCR() {
  if (!ocrReady || !scanning || video.readyState < 2) return;
  try {
    ctx.drawImage(video, 0, 0, 640, 480);
    var cropCanvas = document.createElement('canvas');
    cropCanvas.width = 400; cropCanvas.height = 200;
    var cropCtx = cropCanvas.getContext('2d');
    cropCtx.drawImage(canvas, 120, 140, 400, 200, 0, 0, 400, 200);
    var imageData = cropCtx.getImageData(0, 0, 400, 200);
    var data = imageData.data;
    for (var i = 0; i < data.length; i += 4) {
      var avg = (data[i] + data[i+1] + data[i+2]) / 3;
      var val = avg > 128 ? 255 : 0;
      data[i] = data[i+1] = data[i+2] = val;
    }
    cropCtx.putImageData(imageData, 0, 0);
    var result = await worker.recognize(cropCanvas);
    var text = result.data.text.replace(/\s/g,'').replace(/[^0-9]/g,'');
    var match = text.match(/\d{4}/);
    if (match) {
      var detected = match[0];
      if (detected !== lastDetected) {
        lastDetected = detected;
        statusEl.className = 'found';
        forceDisplay(detected);
        setTimeout(function() { statusEl.className = 'scanning'; }, 2000);
      }
    }
  } catch(e) {}
}

initOCR();
startCamera();
document.addEventListener('visibilitychange', function() {
  if (!document.hidden && !scanning) startCamera();
});
</script>
</body>
</html>
