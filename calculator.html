<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Calculator</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%; width: 100%;
    background: #000;
    font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    overflow: hidden; user-select: none;
  }
  #debug-panel {
    position: fixed; inset: 0; background: #111;
    z-index: 999; display: none;
    flex-direction: column; padding: 16px; gap: 8px;
    overflow-y: auto;
  }
  #debug-panel.visible { display: flex; }
  #debug-video { width: 100%; border-radius: 8px; }
  #debug-canvas { width: 100%; border: 1px solid #ff9f0a; border-radius: 8px; margin-top: 4px; }
  #debug-text {
    font-family: monospace; font-size: 13px; color: #0f0;
    background: #000; padding: 10px; border-radius: 8px;
    min-height: 80px; white-space: pre-wrap; word-break: break-all;
  }
  #debug-close {
    background: #ff3b30; color: #fff; border: none;
    border-radius: 10px; padding: 14px; font-size: 16px; cursor: pointer;
  }
  .calculator {
    width: 100%; height: 100vh; background: #000;
    display: flex; flex-direction: column;
    padding-bottom: env(safe-area-inset-bottom);
  }
  .display {
    flex: 1; display: flex; flex-direction: column;
    justify-content: flex-end; align-items: flex-end;
    padding: 0 28px 12px; min-height: 220px;
  }
  .expression {
    font-size: 22px; color: rgba(255,255,255,0.4);
    margin-bottom: 4px; min-height: 28px; text-align: right;
  }
  .main-display {
    font-size: 88px; font-weight: 200; color: #fff;
    letter-spacing: -4px; line-height: 1; text-align: right;
    word-break: break-all;
  }
  .main-display.small { font-size: 56px; letter-spacing: -2px; }
  .main-display.smaller { font-size: 42px; letter-spacing: -1px; }
  .buttons {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 12px; padding: 12px 16px 20px;
  }
  .btn {
    aspect-ratio: 1; border-radius: 50%; border: none;
    font-size: 32px; font-weight: 400; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: filter 0.08s ease;
  }
  .btn:active { filter: brightness(0.75); }
  .btn-func { background: #a5a5a5; color: #000; font-size: 28px; }
  .btn-op { background: #ff9f0a; color: #fff; }
  .btn-op.active-op { background: #fff; color: #ff9f0a; }
  .btn-num { background: #333333; color: #fff; }
  .btn-zero {
    grid-column: span 2; border-radius: 44px; aspect-ratio: unset;
    height: calc((100vw - 32px - 36px) / 4);
    justify-content: flex-start; padding-left: 36px;
  }
  #ocr-status {
    position: fixed; top: 12px; left: 16px;
    width: 6px; height: 6px; border-radius: 50%;
    background: transparent; z-index: 100;
  }
  #ocr-status.scanning { background: rgba(255,149,0,0.7); }
  #ocr-status.found { background: rgba(52,199,89,0.9); }
</style>
</head>
<body>

<div id="ocr-status"></div>

<!-- Debug Panel -->
<div id="debug-panel">
  <button id="debug-close" onclick="toggleDebug()">✕ Close Debug</button>
  <div style="color:#aaa;font-size:12px;font-family:monospace" id="debug-log">Initializing...</div>
  <video id="debug-video" autoplay playsinline muted></video>
  <div style="color:#ff9f0a;font-size:11px;font-family:monospace;margin-top:4px">↓ Processed crop (what OCR sees)</div>
  <canvas id="debug-canvas"></canvas>
  <div id="debug-text">Waiting for scan...</div>
</div>

<!-- Hidden camera -->
<video id="camera-feed" style="position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;" autoplay playsinline muted></video>
<canvas id="ocr-canvas" style="position:fixed;top:-9999px;left:-9999px;" width="1280" height="720"></canvas>

<!-- Calculator UI -->
<div class="calculator">
  <div class="display" id="display-area">
    <div class="expression" id="expression"></div>
    <div class="main-display" id="main-display">0</div>
  </div>
  <div class="buttons">
    <button class="btn btn-func" onclick="pressFunc('AC')" id="ac-btn">AC</button>
    <button class="btn btn-func" onclick="pressFunc('+/-')">⁺∕₋</button>
    <button class="btn btn-func" onclick="pressFunc('%')">%</button>
    <button class="btn btn-op"   onclick="pressOp('÷')">÷</button>
    <button class="btn btn-num" onclick="pressNum('7')">7</button>
    <button class="btn btn-num" onclick="pressNum('8')">8</button>
    <button class="btn btn-num" onclick="pressNum('9')">9</button>
    <button class="btn btn-op"  onclick="pressOp('×')">×</button>
    <button class="btn btn-num" onclick="pressNum('4')">4</button>
    <button class="btn btn-num" onclick="pressNum('5')">5</button>
    <button class="btn btn-num" onclick="pressNum('6')">6</button>
    <button class="btn btn-op"  onclick="pressOp('−')">−</button>
    <button class="btn btn-num" onclick="pressNum('1')">1</button>
    <button class="btn btn-num" onclick="pressNum('2')">2</button>
    <button class="btn btn-num" onclick="pressNum('3')">3</button>
    <button class="btn btn-op"  onclick="pressOp('+')">+</button>
    <button class="btn btn-num btn-zero" onclick="pressNum('0')">0</button>
    <button class="btn btn-num" onclick="pressNum('.')">.</button>
    <button class="btn btn-op"  onclick="pressEquals()">=</button>
  </div>
</div>

<script>
// ── Calculator ────────────────────────────────────────────────────
var display = '0', expression = '', lastOp = '', firstNum = null, justEquals = false;
var mainEl  = document.getElementById('main-display');
var exprEl  = document.getElementById('expression');
var acBtn   = document.getElementById('ac-btn');
var statusEl = document.getElementById('ocr-status');

function updateDisplay(val) {
  mainEl.textContent = val;
  var len = val.length;
  mainEl.className = 'main-display' + (len > 9 ? ' smaller' : len > 6 ? ' small' : '');
}
function setDisplay(val) {
  display = val; updateDisplay(display);
  acBtn.textContent = display === '0' ? 'AC' : 'C';
}
function pressNum(n) {
  if (justEquals) { display = '0'; justEquals = false; }
  if (n === '.' && display.includes('.')) return;
  if (display === '0' && n !== '.') { display = n; }
  else { if (display.replace('-','').replace('.','').length >= 9) return; display += n; }
  setDisplay(display); highlightOp(null);
}
function pressOp(op) {
  justEquals = false; firstNum = parseFloat(display); lastOp = op;
  expression = display + ' ' + op; exprEl.textContent = expression;
  display = '0'; highlightOp(op);
}
function pressEquals() {
  if (!lastOp || firstNum === null) return;
  var second = parseFloat(display), result;
  switch(lastOp) {
    case '+': result = firstNum + second; break;
    case '−': result = firstNum - second; break;
    case '×': result = firstNum * second; break;
    case '÷': result = second !== 0 ? firstNum / second : 'Error'; break;
    default: result = second;
  }
  exprEl.textContent = expression + ' ' + display + ' =';
  var r = typeof result === 'number' ? (Number.isInteger(result) ? result.toString() : parseFloat(result.toFixed(9)).toString()) : result;
  setDisplay(r); lastOp = ''; firstNum = null; justEquals = true; highlightOp(null);
}
function pressFunc(f) {
  if (f === 'AC' || f === 'C') {
    display = '0'; expression = ''; lastOp = ''; firstNum = null; justEquals = false;
    setDisplay('0'); exprEl.textContent = ''; highlightOp(null);
  } else if (f === '+/-') {
    if (display !== '0') { display = display.startsWith('-') ? display.slice(1) : '-' + display; setDisplay(display); }
  } else if (f === '%') {
    display = (parseFloat(display) / 100).toString(); setDisplay(display);
  }
}
function highlightOp(op) {
  document.querySelectorAll('.btn-op').forEach(function(b) {
    b.classList.remove('active-op');
    if (op && b.textContent.trim() === op) b.classList.add('active-op');
  });
}
function forceDisplay(number) {
  display = number; expression = ''; lastOp = ''; firstNum = null; justEquals = false;
  updateDisplay(display); exprEl.textContent = ''; acBtn.textContent = 'C';
}

// ── Debug toggle — triple tap display ────────────────────────────
var tapCount = 0, tapTimer = null;
document.getElementById('display-area').addEventListener('click', function() {
  tapCount++;
  clearTimeout(tapTimer);
  tapTimer = setTimeout(function() { tapCount = 0; }, 700);
  if (tapCount >= 3) { tapCount = 0; toggleDebug(); }
});
function toggleDebug() {
  var panel = document.getElementById('debug-panel');
  panel.classList.toggle('visible');
  var dv = document.getElementById('debug-video');
  if (panel.classList.contains('visible') && video.srcObject) dv.srcObject = video.srcObject;
}
function debugLog(msg) {
  var el = document.getElementById('debug-log');
  if (el) el.textContent = msg;
}
function debugOCR(msg) {
  var el = document.getElementById('debug-text');
  if (el) el.textContent = msg;
}

// ── OCR Engine ────────────────────────────────────────────────────
var video    = document.getElementById('camera-feed');
var canvas   = document.getElementById('ocr-canvas');
var ctx      = canvas.getContext('2d');
var ocrReady = false, worker = null;
var scanning = false, lastDetected = null, scanInterval = null;

async function initOCR() {
  try {
    debugLog('Loading OCR...');
    worker = await Tesseract.createWorker('eng', 1, { logger: function() {} });
    await worker.setParameters({
      tessedit_char_whitelist: '0123456789',
      tessedit_pageseg_mode: '6', // assume uniform block of text
    });
    ocrReady = true;
    debugLog('OCR ready ✓ — camera: ' + (video.srcObject ? 'on' : 'waiting'));
  } catch(e) {
    debugLog('OCR error: ' + e.message);
  }
}

async function startCamera() {
  try {
    debugLog('Starting camera...');
    var constraints = {
      video: {
        facingMode: { exact: 'environment' },
        width:  { ideal: 1920 },
        height: { ideal: 1080 }
      },
      audio: false
    };
    var stream = await navigator.mediaDevices.getUserMedia(constraints);
    video.srcObject = stream;
    await video.play();
    canvas.width  = video.videoWidth  || 1280;
    canvas.height = video.videoHeight || 720;
    debugLog('Camera on ✓ ' + canvas.width + 'x' + canvas.height);
    startScanning();
  } catch(e) {
    debugLog('Camera err: ' + e.message + ' — trying fallback');
    try {
      var s2 = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
      video.srcObject = s2;
      await video.play();
      canvas.width  = video.videoWidth  || 640;
      canvas.height = video.videoHeight || 480;
      debugLog('Fallback camera on ✓');
      startScanning();
    } catch(e2) {
      debugLog('All cameras failed: ' + e2.message);
    }
  }
}

function startScanning() {
  if (scanInterval) clearInterval(scanInterval);
  scanning = true;
  statusEl.className = 'scanning';
  scanInterval = setInterval(captureAndOCR, 1200);
}

async function captureAndOCR() {
  if (!ocrReady || video.readyState < 2) return;

  try {
    var vw = video.videoWidth  || canvas.width;
    var vh = video.videoHeight || canvas.height;
    canvas.width = vw; canvas.height = vh;
    ctx.drawImage(video, 0, 0, vw, vh);

    // Take center 60% of frame — where a phone display would be
    var cropX = Math.floor(vw * 0.1);
    var cropY = Math.floor(vh * 0.1);
    var cropW = Math.floor(vw * 0.8);
    var cropH = Math.floor(vh * 0.8);

    var cc = document.createElement('canvas');
    cc.width = cropW; cc.height = cropH;
    var cctx = cc.getContext('2d');
    cctx.drawImage(canvas, cropX, cropY, cropW, cropH, 0, 0, cropW, cropH);

    // Scale up for better OCR accuracy
    var scaled = document.createElement('canvas');
    scaled.width  = cropW * 2;
    scaled.height = cropH * 2;
    var sctx = scaled.getContext('2d');
    sctx.imageSmoothingEnabled = false;
    sctx.drawImage(cc, 0, 0, scaled.width, scaled.height);

    // Show in debug
    var dc = document.getElementById('debug-canvas');
    if (dc) {
      dc.width = Math.min(scaled.width, 360);
      dc.height = Math.round(scaled.height * (dc.width / scaled.width));
      var dctx = dc.getContext('2d');
      dctx.drawImage(scaled, 0, 0, dc.width, dc.height);
    }

    // Run OCR on raw (no inversion — handles both light and dark screens)
    var r1 = await worker.recognize(scaled);
    var raw1 = r1.data.text;
    var digits1 = raw1.replace(/\s/g,'').replace(/[^0-9]/g,'');

    // Also try inverted
    var imgData = sctx.getImageData(0, 0, scaled.width, scaled.height);
    var d = imgData.data;
    for (var i = 0; i < d.length; i += 4) {
      d[i]   = 255 - d[i];
      d[i+1] = 255 - d[i+1];
      d[i+2] = 255 - d[i+2];
    }
    sctx.putImageData(imgData, 0, 0);
    var r2 = await worker.recognize(scaled);
    var raw2 = r2.data.text;
    var digits2 = raw2.replace(/\s/g,'').replace(/[^0-9]/g,'');

    var allDigits = digits1.length >= digits2.length ? digits1 : digits2;
    debugOCR('Normal: "' + raw1.trim() + '"\nInverted: "' + raw2.trim() + '"\nBest digits: "' + allDigits + '"');
    debugLog('Scanning... digits found: ' + allDigits.length);

    var match = allDigits.match(/\d{4}/);
    if (match) {
      var detected = match[0];
      if (detected !== lastDetected) {
        lastDetected = detected;
        statusEl.className = 'found';
        forceDisplay(detected);
        debugLog('✓ DETECTED: ' + detected);
        setTimeout(function() { statusEl.className = 'scanning'; }, 3000);
      }
    }
  } catch(e) {
    debugLog('Scan error: ' + e.message);
  }
}

// ── Start ─────────────────────────────────────────────────────────
initOCR();
startCamera();
document.addEventListener('visibilitychange', function() {
  if (!document.hidden && !scanning) startCamera();
});
</script>
</body>
</html>
